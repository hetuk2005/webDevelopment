<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jQuery CRUD with Real API</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="./CRUD.css">
</head>
<body>
    <div class="container">
        <h1>📡 Contact Manager (API Version)</h1>

        <div id="notification" class="notification"></div>

        <div class="form-container">
            <div class="api-status">
            </div>
            
            <h2 id="form-title">Add New Contact</h2>
            
            <form id="contactForm">
                <input type="hidden" id="contactId">
                
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" placeholder="Enter name">
                    <span class="error-message" id="nameError">Name is required</span>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" placeholder="Enter email">
                    <span class="error-message" id="emailError">Valid email is required</span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        Save Contact
                    </button>
                    <button type="button" class="btn btn-secondary hidden" id="cancelBtn">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <div id="spinner" class="spinner">⏳ Loading...</div>

        <div class="data-container">
            <h2>Contacts List</h2>
            <table id="contactsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="contactsBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state hidden">
                <p>No contacts found.</p>
            </div>
        </div>
    </div>

    <script src="./CRUD.js"></script>
</body>
</html>
