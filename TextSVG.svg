<svg width="475" height="51" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .typing-text {
        font-family: 'Fira Code', 'Courier New', monospace;
        font-size: 27px;
        font-weight: 900;
        dominant-baseline: middle;
        text-anchor: middle;
        /* Total cycle: 35 seconds (5s per color) */
        animation: 
          reveal 5s infinite, 
          colorCycle 35s infinite;
      }

      /* The "Typing" motion - happens every 2 seconds */
      @keyframes reveal {
        0%   { clip-path: inset(0 100% 0 0); opacity: 0; }
        10%  { clip-path: inset(0 100% 0 0); opacity: 1; } /* Start typing */
        60%  { clip-path: inset(0 0% 0 0); opacity: 1; }   /* Typing ends (Slow 2.5s crawl) */
        85%  { clip-path: inset(0 0% 0 0); opacity: 1; }   /* Hold for reading */
        100% { clip-path: inset(0 100% 0 0); opacity: 0; }
      }

      /* The Color Cycle - shifts every 5 seconds (1/7th of 100%) */
      @keyframes colorCycle {
        0%, 14.2%    { fill: #00ff00; } /* Green */
        14.3%, 28.5% { fill: #ff0000; } /* Red */
        28.6%, 42.8% { fill: #ff7700; } /* Orange */
        42.9%, 57.1% { fill: #ffff00; } /* Yellow */
        57.2%, 71.4% { fill: #0099ff; } /* Blue */
        71.5%, 85.7% { fill: #aa00ff; } /* Purple */
        85.8%, 100%  { fill: #ff00cc; } /* Pink */
      }
    </style>
  </defs>

  <rect width="555" height="51" fill="none"/>

  <text class="typing-text" x="245.5" y="25.5">
      ABKI BAAR 300 KE PAR 😂 🤯 😂
  </text>
</svg>
